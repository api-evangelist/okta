      operations:
      - name: activateauthenticator
        method: POST
        description: Success
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: authenticatorId
          in: path
          type: string
          required: true
    - name: api-v1-authenticators-authenticatorId-lifecycle-deactivate
