      operations:
      - name: getauthenticator
        method: GET
        description: Success
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: authenticatorId
          in: path
          type: string
          required: true
      - name: updateauthenticator
        method: PUT
        description: Okta Update Authenticator
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
