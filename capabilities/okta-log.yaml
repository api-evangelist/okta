naftiko: 1.0.0-alpha2
info:
  label: Okta API — Log
  description: 'Okta API — Log. 1 operations. Lead operation: Fetch a list of events from your Okta organization system log..
    Self-contained Naftiko capability covering one Okta business surface.'
  tags:
  - Okta
  - Log
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OKTA_API_KEY: OKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: okta-log
    baseUri: https://your-subdomain.okta.com
    description: Okta API — Log business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-logs
      path: /api/v1/logs
      operations:
      - name: getlogs
        method: GET
        description: Fetch a list of events from your Okta organization system log.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
        - name: until
          in: query
          type: string
        - name: filter
          in: query
          type: string
        - name: q
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: sortOrder
          in: query
          type: string
        - name: after
          in: query
          type: string
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OKTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: okta-log-rest
    port: 8080
    description: REST adapter for Okta API — Log. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/logs
      name: api-v1-logs
      description: REST surface for api-v1-logs.
      operations:
      - method: GET
        name: getlogs
        description: Fetch a list of events from your Okta organization system log.
        call: okta-log.getlogs
        with:
          since: rest.since
          until: rest.until
          filter: rest.filter
          q: rest.q
          limit: rest.limit
          sortOrder: rest.sortOrder
          after: rest.after
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: okta-log-mcp
    port: 9090
    transport: http
    description: MCP adapter for Okta API — Log. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: fetch-list-events-your-okta
      description: Fetch a list of events from your Okta organization system log.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta-log.getlogs
      with:
        since: tools.since
        until: tools.until
        filter: tools.filter
        q: tools.q
        limit: tools.limit
        sortOrder: tools.sortOrder
        after: tools.after
      outputParameters:
      - type: object
        mapping: $.
