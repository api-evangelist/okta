        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: zoneId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletenetworkzone
        method: DELETE
        description: Okta Delete Network Zone
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
