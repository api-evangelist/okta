  - type: mcp
    port: 9090
    namespace: okta-mcp
    transport: http
    description: MCP adapter for Okta API for AI agent use.
    tools:
    - name: listapplications
      description: Okta List Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta.listapplications
      with:
        q: tools.q
        after: tools.after
        limit: tools.limit
        filter: tools.filter
        expand: tools.expand
        includeNonDeleted: tools.includeNonDeleted
      inputParameters:
      - name: q
        type: string
        description: q
      - name: after
        type: string
        description: Specifies the pagination cursor for the next page of apps
      - name: limit
        type: integer
        description: Specifies the number of results for a page
      - name: filter
        type: string
        description: Filters apps by status, user.id, group.id or credentials.signing.kid expression
      - name: expand
        type: string
        description: Traverses users link relationship and optionally embeds Application User resource
      - name: includeNonDeleted
        type: boolean
        description: includeNonDeleted
