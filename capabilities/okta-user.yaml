naftiko: 1.0.0-alpha2
info:
  label: Okta API — User
  description: 'Okta API — User. 52 operations. Lead operation: Okta List Users. Self-contained Naftiko capability covering
    one Okta business surface.'
  tags:
  - Okta
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OKTA_API_KEY: OKTA_API_KEY
capability:
