naftiko: 1.0.0-alpha2
info:
  label: Okta API — Template
  description: 'Okta API — Template. 6 operations. Lead operation: Okta List SMS Templates. Self-contained Naftiko capability
    covering one Okta business surface.'
  tags:
  - Okta
  - Template
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OKTA_API_KEY: OKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: okta-template
    baseUri: https://your-subdomain.okta.com
    description: Okta API — Template business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-templates-sms
      path: /api/v1/templates/sms
      operations:
      - name: listsmstemplates
        method: GET
        description: Okta List SMS Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateType
          in: query
          type: string
      - name: createsmstemplate
        method: POST
        description: Okta Add SMS Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-templates-sms-templateId
      path: /api/v1/templates/sms/{templateId}
      operations:
      - name: getsmstemplate
        method: GET
        description: Okta Get SMS Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateId
          in: path
          type: string
          required: true
      - name: updatesmstemplate
        method: PUT
        description: Okta Update SMS Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: partialupdatesmstemplate
        method: POST
        description: Okta Partial SMS Template Update
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesmstemplate
        method: DELETE
        description: Okta Remove SMS Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: templateId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OKTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: okta-template-rest
    port: 8080
    description: REST adapter for Okta API — Template. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v1/templates/sms
      name: api-v1-templates-sms
      description: REST surface for api-v1-templates-sms.
      operations:
      - method: GET
        name: listsmstemplates
        description: Okta List SMS Templates
        call: okta-template.listsmstemplates
        with:
          templateType: rest.templateType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsmstemplate
        description: Okta Add SMS Template
        call: okta-template.createsmstemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/templates/sms/{templateid}
      name: api-v1-templates-sms-templateid
      description: REST surface for api-v1-templates-sms-templateId.
      operations:
      - method: GET
        name: getsmstemplate
        description: Okta Get SMS Template
        call: okta-template.getsmstemplate
        with:
          templateId: rest.templateId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesmstemplate
        description: Okta Update SMS Template
        call: okta-template.updatesmstemplate
        with:
          templateId: rest.templateId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: partialupdatesmstemplate
        description: Okta Partial SMS Template Update
        call: okta-template.partialupdatesmstemplate
        with:
          templateId: rest.templateId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesmstemplate
        description: Okta Remove SMS Template
        call: okta-template.deletesmstemplate
        with:
          templateId: rest.templateId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: okta-template-mcp
    port: 9090
    transport: http
    description: MCP adapter for Okta API — Template. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: okta-list-sms-templates
      description: Okta List SMS Templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta-template.listsmstemplates
      with:
        templateType: tools.templateType
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-add-sms-template
      description: Okta Add SMS Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: okta-template.createsmstemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-get-sms-template
      description: Okta Get SMS Template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta-template.getsmstemplate
      with:
        templateId: tools.templateId
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-update-sms-template
      description: Okta Update SMS Template
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: okta-template.updatesmstemplate
      with:
        templateId: tools.templateId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-partial-sms-template-update
      description: Okta Partial SMS Template Update
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: okta-template.partialupdatesmstemplate
      with:
        templateId: tools.templateId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-remove-sms-template
      description: Okta Remove SMS Template
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: okta-template.deletesmstemplate
      with:
        templateId: tools.templateId
      outputParameters:
      - type: object
        mapping: $.
