naftiko: 1.0.0-alpha2
info:
  label: Okta API — Domain
  description: 'Okta API — Domain. 6 operations. Lead operation: Okta List Domains. Self-contained Naftiko capability covering
    one Okta business surface.'
  tags:
  - Okta
  - Domain
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OKTA_API_KEY: OKTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: okta-domain
    baseUri: https://your-subdomain.okta.com
    description: Okta API — Domain business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-domains
      path: /api/v1/domains
      operations:
      - name: listdomains
        method: GET
        description: Okta List Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdomain
        method: POST
        description: Okta Create Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-domains-domainId
      path: /api/v1/domains/{domainId}
      operations:
      - name: getdomain
        method: GET
        description: Okta Get Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainId
          in: path
          type: string
          required: true
      - name: deletedomain
        method: DELETE
        description: Okta Delete Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainId
          in: path
          type: string
          required: true
    - name: api-v1-domains-domainId-certificate
      path: /api/v1/domains/{domainId}/certificate
      operations:
      - name: createcertificate
        method: PUT
        description: Okta Create Certificate
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-domains-domainId-verify
      path: /api/v1/domains/{domainId}/verify
      operations:
      - name: verifydomain
        method: POST
        description: Okta Verify Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.OKTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: okta-domain-rest
    port: 8080
    description: REST adapter for Okta API — Domain. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/v1/domains
      name: api-v1-domains
      description: REST surface for api-v1-domains.
      operations:
      - method: GET
        name: listdomains
        description: Okta List Domains
        call: okta-domain.listdomains
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdomain
        description: Okta Create Domain
        call: okta-domain.createdomain
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/domains/{domainid}
      name: api-v1-domains-domainid
      description: REST surface for api-v1-domains-domainId.
      operations:
      - method: GET
        name: getdomain
        description: Okta Get Domain
        call: okta-domain.getdomain
        with:
          domainId: rest.domainId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedomain
        description: Okta Delete Domain
        call: okta-domain.deletedomain
        with:
          domainId: rest.domainId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/domains/{domainid}/certificate
      name: api-v1-domains-domainid-certificate
      description: REST surface for api-v1-domains-domainId-certificate.
      operations:
      - method: PUT
        name: createcertificate
        description: Okta Create Certificate
        call: okta-domain.createcertificate
        with:
          domainId: rest.domainId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/domains/{domainid}/verify
      name: api-v1-domains-domainid-verify
      description: REST surface for api-v1-domains-domainId-verify.
      operations:
      - method: POST
        name: verifydomain
        description: Okta Verify Domain
        call: okta-domain.verifydomain
        with:
          domainId: rest.domainId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: okta-domain-mcp
    port: 9090
    transport: http
    description: MCP adapter for Okta API — Domain. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: okta-list-domains
      description: Okta List Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta-domain.listdomains
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-create-domain
      description: Okta Create Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: okta-domain.createdomain
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-get-domain
      description: Okta Get Domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: okta-domain.getdomain
      with:
        domainId: tools.domainId
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-delete-domain
      description: Okta Delete Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: okta-domain.deletedomain
      with:
        domainId: tools.domainId
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-create-certificate
      description: Okta Create Certificate
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: okta-domain.createcertificate
      with:
        domainId: tools.domainId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: okta-verify-domain
      description: Okta Verify Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: okta-domain.verifydomain
      with:
        domainId: tools.domainId
      outputParameters:
      - type: object
        mapping: $.
