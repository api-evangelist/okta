"""
Okta GraphQL Schema — Conceptual
Derived from the Okta Management REST API, JSON Schemas, and AsyncAPI Events surface.
REST reference: https://developer.okta.com/docs/reference/
OpenAPI source: https://github.com/okta/okta-management-openapi-spec
Schema source: conceptual
"""

scalar DateTime
scalar JSON
scalar URL

# ──────────────────────────────────────────────
# Enums
# ──────────────────────────────────────────────

enum UserStatus {
  STAGED
  PROVISIONED
  ACTIVE
  RECOVERY
  LOCKED_OUT
  PASSWORD_EXPIRED
  SUSPENDED
  DEPROVISIONED
}

enum GroupType {
  OKTA_GROUP
  APP_GROUP
  BUILT_IN
}

enum ApplicationStatus {
  ACTIVE
  INACTIVE
  DELETED
}

enum FactorType {
  TOKEN
  TOKEN_SOFTWARE_TOTP
  TOKEN_HARDWARE
  QUESTION
  SMS
  CALL
  EMAIL
  PUSH
  U2F
  WEBAUTHN
  SIGNED_NONCE
}

enum FactorStatus {
  NOT_SETUP
  PENDING_ACTIVATION
  ENROLLED
  ACTIVE
  INACTIVE
  EXPIRED
}

enum FactorProvider {
  OKTA
  RSA
  SYMANTEC
  GOOGLE
  DUO
  YUBICO
  FIDO
  CUSTOM
}

enum PolicyType {
  OKTA_SIGN_ON
  PASSWORD
  MFA_ENROLL
  OAUTH_AUTHORIZATION_POLICY
  IDP_DISCOVERY
  ACCESS_POLICY
  PROFILE_ENROLLMENT
  POST_AUTH_SESSION
}

enum PolicyStatus {
  ACTIVE
  INACTIVE
}

enum AuthServerStatus {
  ACTIVE
  INACTIVE
  DELETED
}

enum HookStatus {
  ACTIVE
  INACTIVE
}

enum SeverityLevel {
  DEBUG
  INFO
  WARN
  ERROR
}

enum AdminRoleType {
  SUPER_ADMIN
  ORG_ADMIN
  API_ACCESS_MANAGEMENT_ADMIN
  APP_ADMIN
  USER_ADMIN
  READ_ONLY_ADMIN
  MOBILE_ADMIN
  REPORT_ADMIN
  GROUP_MEMBERSHIP_ADMIN
  HELP_DESK_ADMIN
  CUSTOM
}

enum NetworkZoneType {
  IP
  DYNAMIC
  DYNAMIC_V2
}

enum NetworkZoneStatus {
  ACTIVE
  INACTIVE
}

enum DeviceStatus {
  NOT_REGISTERED
  REGISTERED
}

# ──────────────────────────────────────────────
# User Domain
# ──────────────────────────────────────────────

"""
A user in the Okta Universal Directory.
"""
type User {
  id: ID!
  status: UserStatus!
  created: DateTime!
  activated: DateTime
  statusChanged: DateTime
  lastLogin: DateTime
  lastUpdated: DateTime!
  passwordChanged: DateTime
  profile: UserProfile!
  credentials: UserCredentials
  type: UserType
  transitioningToStatus: UserStatus
  groups: [Group!]!
  factors: [Factor!]!
  sessions: [Session!]!
  roles: [AdminRole!]!
  linkedObjects(relationship: String!): [User!]!
  appLinks: [AppLink!]!
}

"""
Standard and custom profile attributes for a user.
Custom attributes are namespace-prefixed (e.g., custom_ns:department).
"""
type UserProfile {
  login: String!
  email: String!
  secondEmail: String
  firstName: String
  lastName: String
  middleName: String
  honorificPrefix: String
  honorificSuffix: String
  displayName: String
  nickName: String
  profileUrl: URL
  primaryPhone: String
  mobilePhone: String
  streetAddress: String
  city: String
  state: String
  zipCode: String
  countryCode: String
  postalAddress: String
  preferredLanguage: String
  locale: String
  timezone: String
  userType: String
  employeeNumber: String
  costCenter: String
  organization: String
  division: String
  department: String
  managerId: String
  manager: String
  customAttributes: JSON
}

"""
Credentials container for a user (password, recovery question, provider).
"""
type UserCredentials {
  password: PasswordCredential
  recoveryQuestion: RecoveryQuestionCredential
  provider: AuthenticationProvider
}

type PasswordCredential {
  value: String
  hash: PasswordHash
  hook: PasswordHook
}

type PasswordHash {
  algorithm: String!
  workFactor: Int
  salt: String
  saltOrder: String
  value: String
}

type PasswordHook {
  type: String!
}

type RecoveryQuestionCredential {
  question: String
  answer: String
}

type AuthenticationProvider {
  type: String!
  name: String
}

"""
User type defining which schema definition a user conforms to.
"""
type UserType {
  id: ID!
  name: String!
  displayName: String!
  description: String
  default: Boolean!
  created: DateTime!
  createdBy: String!
  lastUpdated: DateTime!
  lastUpdatedBy: String!
  schema: UserSchema
}

"""
App link — a shortcut to an application assigned to a user.
"""
type AppLink {
  id: ID!
  label: String!
  linkUrl: URL!
  logoUrl: URL
  appName: String!
  appInstanceId: ID!
  appAssignmentId: ID!
  hidden: Boolean!
  sortOrder: Int!
}

# ──────────────────────────────────────────────
# Group Domain
# ──────────────────────────────────────────────

"""
A group of users in the Okta Universal Directory.
"""
type Group {
  id: ID!
  created: DateTime!
  lastUpdated: DateTime!
  lastMembershipUpdated: DateTime!
  objectClass: [String!]!
  type: GroupType!
  profile: GroupProfile!
  users: [User!]!
  applications: [Application!]!
  schema: GroupSchema
}

type GroupProfile {
  name: String!
  description: String
  samAccountName: String
  dn: String
  windowsDomainQualifiedName: String
  externalId: String
  customAttributes: JSON
}

"""
An explicit membership record linking a user to a group.
"""
type GroupMembership {
  group: Group!
  user: User!
  addedAt: DateTime
}

"""
A rule that automatically assigns users to a group based on an expression.
"""
type GroupRule {
  id: ID!
  type: String!
  name: String!
  status: String!
  created: DateTime!
  lastUpdated: DateTime!
  conditions: GroupRuleConditions
  actions: GroupRuleAction!
}

type GroupRuleConditions {
  expression: GroupRuleExpression
  people: GroupRulePeopleCondition
}

type GroupRuleExpression {
  type: String!
  value: String!
}

type GroupRulePeopleCondition {
  users: GroupRuleUserCondition
  groups: GroupRuleGroupCondition
}

type GroupRuleUserCondition {
  include: [ID!]!
  exclude: [ID!]!
}

type GroupRuleGroupCondition {
  include: [ID!]!
  exclude: [ID!]!
}

type GroupRuleAction {
  assignUserToGroups: GroupRuleGroupAssignment!
}

type GroupRuleGroupAssignment {
  groupIds: [ID!]!
}

# ──────────────────────────────────────────────
# Application Domain
# ──────────────────────────────────────────────

"""
An application registered in the Okta Integration Network or a custom connector.
"""
type Application {
  id: ID!
  name: String!
  label: String!
  status: ApplicationStatus!
  created: DateTime!
  lastUpdated: DateTime!
  features: [String!]!
  signOnMode: String!
  credentials: ApplicationCredentials
  settings: JSON
  users: [AppUser!]!
  groups: [AppGroup!]!
  sso: SSOProfile
}

"""
Credential set for an application (signing key, client secret, scheme).
"""
type ApplicationCredentials {
  scheme: String
  userNameTemplate: UserNameTemplate
  signing: SigningCredential
  oauthClient: OAuthClientCredential
  revealPassword: Boolean
  userName: String
  password: PasswordCredential
}

type UserNameTemplate {
  template: String!
  type: String!
  suffix: String
  pushStatus: String
}

type SigningCredential {
  kid: ID!
  lastRotated: DateTime
  nextRotation: DateTime
  rotationMode: String
  use: String
}

type OAuthClientCredential {
  autoKeyRotation: Boolean!
  clientId: ID!
  clientSecret: String
  tokenEndpointAuthMethod: String!
}

"""
A user's assignment record for a specific application.
"""
type AppUser {
  id: ID!
  externalId: String
  created: DateTime!
  lastUpdated: DateTime!
  scope: String!
  status: String!
  statusChanged: DateTime
  passwordChanged: DateTime
  syncState: String!
  lastSync: DateTime
  credentials: AppUserCredentials
  profile: JSON
  user: User!
  application: Application!
}

type AppUserCredentials {
  userName: String
  password: PasswordCredential
}

"""
A group's assignment record for a specific application.
"""
type AppGroup {
  id: ID!
  lastUpdated: DateTime!
  priority: Int!
  profile: JSON
  group: Group!
  application: Application!
}

# ──────────────────────────────────────────────
# Session Domain
# ──────────────────────────────────────────────

"""
A browser session established after primary authentication.
"""
type Session {
  id: ID!
  login: String!
  userId: ID!
  expiresAt: DateTime!
  status: String!
  lastPasswordVerification: DateTime
  lastFactorVerification: DateTime
  amr: [String!]!
  idp: SessionIdentityProvider!
  mfaActive: Boolean!
  createdAt: DateTime!
}

type SessionIdentityProvider {
  id: ID!
  type: String!
}

# ──────────────────────────────────────────────
# Authentication / MFA Domain
# ──────────────────────────────────────────────

"""
An enrolled authenticator factor for a user.
"""
type Factor {
  id: ID!
  factorType: FactorType!
  provider: FactorProvider!
  status: FactorStatus!
  created: DateTime!
  lastUpdated: DateTime!
  profile: FactorProfile
  vendorName: String
  user: User!
}

type FactorProfile {
  phoneNumber: String
  email: String
  questionText: String
  question: String
  credentialId: String
  authenticatorName: String
  appId: String
  version: String
}

"""
An in-progress MFA verification challenge.
"""
type Challenge {
  factorId: ID!
  sessionToken: String
  expiresAt: DateTime
  status: String!
  factorResult: String
  correctAnswer: String
}

"""
A conceptual MFA configuration object (alias for factor enrollment metadata).
"""
type MFA {
  id: ID!
  factorType: FactorType!
  provider: FactorProvider!
  status: FactorStatus!
  enrolledAt: DateTime
  user: User!
}

# ──────────────────────────────────────────────
# Policy Domain
# ──────────────────────────────────────────────

"""
A policy container (sign-on, password, MFA enrollment, lifecycle, etc.).
"""
type Policy {
  id: ID!
  name: String!
  description: String
  type: PolicyType!
  status: PolicyStatus!
  priority: Int!
  system: Boolean!
  created: DateTime!
  lastUpdated: DateTime!
  conditions: PolicyCondition
  rules: [PolicyRule!]!
}

"""
Condition predicate for a policy or rule.
"""
type PolicyCondition {
  network: NetworkZoneCondition
  people: PeopleCondition
  authContext: AuthContextCondition
  riskScore: RiskScoreCondition
  device: DeviceCondition
  userIdentifier: UserIdentifierCondition
  application: AppAndInstanceCondition
}

type NetworkZoneCondition {
  include: [NetworkZoneReference!]
  exclude: [NetworkZoneReference!]
}

type NetworkZoneReference {
  type: String!
  id: ID
}

type PeopleCondition {
  users: UserCondition
  groups: GroupCondition
}

type UserCondition {
  include: [ID!]!
  exclude: [ID!]!
}

type GroupCondition {
  include: [ID!]!
  exclude: [ID!]!
}

type AuthContextCondition {
  authType: String
}

type RiskScoreCondition {
  level: String
}

type DeviceCondition {
  registered: Boolean
  managed: Boolean
  assurance: DeviceAssuranceCondition
}

type DeviceAssuranceCondition {
  id: ID
}

type UserIdentifierCondition {
  type: String
  attribute: String
  patterns: [UserIdentifierPattern!]
}

type UserIdentifierPattern {
  matchType: String!
  value: String!
}

type AppAndInstanceCondition {
  include: [AppInstanceCondition!]
  exclude: [AppInstanceCondition!]
}

type AppInstanceCondition {
  type: String!
  id: ID
}

"""
An ordered condition-action pair within a policy.
"""
type PolicyRule {
  id: ID!
  name: String!
  type: String!
  status: PolicyStatus!
  priority: Int!
  system: Boolean!
  created: DateTime!
  lastUpdated: DateTime!
  conditions: PolicyCondition
  actions: PolicyRuleAction!
}

type PolicyRuleAction {
  signon: SignOnAction
  password: PasswordAction
  enroll: EnrollAction
}

type SignOnAction {
  access: String!
  requireFactor: Boolean
  factorPromptMode: String
  rememberDeviceByDefault: Boolean
  session: SessionConfigAction
}

type SessionConfigAction {
  usePersistentCookie: Boolean!
  maxSessionIdleMinutes: Int!
  maxSessionLifetimeMinutes: Int!
}

type PasswordAction {
  access: String!
}

type EnrollAction {
  self: String!
}

"""
Sign-on policy governing when and how re-authentication or step-up is triggered.
"""
type SignOnPolicy {
  id: ID!
  name: String!
  status: PolicyStatus!
  priority: Int!
  rules: [SignOnPolicyRule!]!
}

type SignOnPolicyRule {
  id: ID!
  name: String!
  priority: Int!
  status: PolicyStatus!
  conditions: PolicyCondition
  actions: SignOnAction!
}

"""
An SSO profile configuration for an application (SAML, OIDC, WS-Fed).
"""
type SSOProfile {
  signOnMode: String!
  idpBinding: String
  defaultRelayState: String
  ssoAcsUrl: URL
  audience: String
  recipient: String
  destination: URL
  subjectNameIdTemplate: String
  subjectNameIdFormat: String
  responseSigned: Boolean
  assertionSigned: Boolean
  signatureAlgorithm: String
  digestAlgorithm: String
  honorForceAuthn: Boolean
  authnContextClassRef: String
  allowMultipleAcsEndpoints: Boolean
}

# ──────────────────────────────────────────────
# Authorization Server / OAuth Domain
# ──────────────────────────────────────────────

"""
An OAuth 2.0 / OIDC authorization server managed by Okta (API Access Management, Enterprise).
"""
type AuthServer {
  id: ID!
  name: String!
  description: String
  audiences: [String!]!
  issuer: URL!
  issuerMode: String!
  status: AuthServerStatus!
  created: DateTime!
  lastUpdated: DateTime!
  credentials: AuthServerCredentials
  scopes: [Scope!]!
  claims: [Claim!]!
  policies: [Policy!]!
}

type AuthServerCredentials {
  signing: SigningCredential!
}

"""
An OAuth 2.0 scope defined on an authorization server.
"""
type Scope {
  id: ID!
  name: String!
  description: String
  displayName: String
  default: Boolean!
  system: Boolean!
  consent: String!
  metadataPublish: String!
}

"""
A claim added to tokens issued by an authorization server.
"""
type Claim {
  id: ID!
  name: String!
  status: String!
  claimType: String!
  valueType: String!
  value: String!
  alwaysIncludeInToken: Boolean!
  system: Boolean!
  conditions: ClaimConditions
}

type ClaimConditions {
  scopes: [String!]!
}

"""
A registered OIDC / OAuth 2.0 client application.
"""
type OAuthClient {
  clientId: ID!
  clientSecret: String
  clientName: String!
  clientUri: URL
  logoUri: URL
  redirectUris: [URL!]!
  postLogoutRedirectUris: [URL!]!
  responseTypes: [String!]!
  grantTypes: [String!]!
  tokenEndpointAuthMethod: String!
  applicationType: String!
  issuerUri: URL
  initiateLoginUri: URL
  jwksUri: URL
}

"""
An OAuth 2.0 access token issued by an authorization server.
"""
type AccessToken {
  tokenId: ID!
  expiresAt: DateTime!
  status: String!
  created: DateTime!
  lastUpdated: DateTime!
  issuer: URL!
  subject: String!
  scopes: [String!]!
  clientId: ID!
  userId: ID
}

"""
An OAuth 2.0 refresh token.
"""
type RefreshToken {
  tokenId: ID!
  expiresAt: DateTime!
  issuer: URL!
  clientId: ID!
  userId: ID
  scopes: [String!]!
  status: String!
  created: DateTime!
  lastUpdated: DateTime!
}

"""
The result of an OAuth 2.0 token introspection request.
"""
type IntrospectionResult {
  active: Boolean!
  scope: String
  clientId: ID
  username: String
  tokenType: String
  exp: Int
  iat: Int
  sub: String
  aud: String
  iss: URL
  jti: ID
  uid: ID
}

# ──────────────────────────────────────────────
# Threat Intelligence and Network Security
# ──────────────────────────────────────────────

"""
Okta's IP reputation and anomaly detection configuration (ThreatInsight).
"""
type ThreatInsight {
  action: String!
  excludeZones: [ID!]!
  created: DateTime!
  lastUpdated: DateTime!
}

"""
An IP-range or ASN-based network perimeter used in policy conditions.
"""
type NetworkZone {
  id: ID!
  name: String!
  type: NetworkZoneType!
  status: NetworkZoneStatus!
  system: Boolean!
  usage: String!
  created: DateTime!
  lastUpdated: DateTime!
  gateways: [NetworkZoneAddress!]
  proxies: [NetworkZoneAddress!]
  proxyType: String
  locations: [NetworkZoneLocation!]
  asns: [String!]
}

type NetworkZoneAddress {
  type: String!
  value: String!
}

type NetworkZoneLocation {
  country: String!
  include: [String!]
}

# ──────────────────────────────────────────────
# System Log / Audit
# ──────────────────────────────────────────────

"""
A single immutable audit event from the Okta System Log.
"""
type SystemLog {
  uuid: ID!
  published: DateTime!
  eventType: String!
  version: String!
  severity: SeverityLevel!
  legacyEventType: String
  displayMessage: String!
  actor: LogActor!
  client: LogClient
  outcome: LogOutcome
  target: [LogTarget!]
  transaction: LogTransaction
  debugContext: LogDebugContext
  authenticationContext: LogAuthenticationContext
  securityContext: LogSecurityContext
  request: LogRequest
}

type LogActor {
  id: ID!
  type: String!
  alternateId: String
  displayName: String!
  detail: JSON
}

type LogClient {
  id: String
  ipAddress: String
  geographicalContext: LogGeographicalContext
  zone: String
  userAgent: LogUserAgent
  device: String
}

type LogGeographicalContext {
  city: String
  state: String
  country: String
  postalCode: String
  geolocation: LogGeolocation
}

type LogGeolocation {
  lat: Float!
  lon: Float!
}

type LogUserAgent {
  rawUserAgent: String
  os: String
  browser: String
}

type LogOutcome {
  result: String!
  reason: String
}

type LogTarget {
  id: ID!
  type: String!
  alternateId: String
  displayName: String!
  detailEntry: JSON
}

type LogTransaction {
  type: String!
  id: ID!
  detail: JSON
}

type LogDebugContext {
  debugData: JSON
}

type LogAuthenticationContext {
  authenticationProvider: String
  credentialProvider: [String!]
  credentialType: [String!]
  issuer: LogIssuer
  interface: String
  authenticationStep: Int
  externalSessionId: ID
}

type LogIssuer {
  id: ID
  type: String
}

type LogSecurityContext {
  asNumber: Int
  asOrg: String
  isp: String
  domain: String
  isProxy: Boolean
}

type LogRequest {
  ipChain: [LogIpAddress!]
}

type LogIpAddress {
  ip: String!
  geographicalContext: LogGeographicalContext
  version: String
  source: String
}

# ──────────────────────────────────────────────
# Hooks and Automation
# ──────────────────────────────────────────────

"""
An outbound webhook that delivers Okta system events to an external HTTPS endpoint.
"""
type EventHook {
  id: ID!
  name: String!
  status: HookStatus!
  verificationStatus: String!
  created: DateTime!
  lastUpdated: DateTime!
  events: EventHookEvents!
  channel: EventHookChannel!
}

type EventHookEvents {
  type: String!
  items: [String!]!
}

type EventHookChannel {
  type: String!
  version: String!
  config: EventHookChannelConfig!
}

type EventHookChannelConfig {
  uri: URL!
  authScheme: EventHookAuthScheme
  headers: [EventHookHeader!]
}

type EventHookAuthScheme {
  type: String!
  key: String!
  value: String
}

type EventHookHeader {
  key: String!
  value: String!
}

"""
An inline hook that intercepts an Okta flow for external enrichment.
"""
type InlineHook {
  id: ID!
  name: String!
  type: String!
  status: HookStatus!
  version: String!
  created: DateTime!
  lastUpdated: DateTime!
  channel: InlineHookChannel!
}

type InlineHookChannel {
  type: String!
  version: String!
  config: InlineHookChannelConfig!
}

type InlineHookChannelConfig {
  uri: URL!
  headers: [EventHookHeader!]
  authScheme: EventHookAuthScheme
}

"""
The response payload returned by an external inline hook handler.
"""
type InlineHookResponse {
  commands: [InlineHookCommand!]!
  error: InlineHookError
}

type InlineHookCommand {
  type: String!
  value: [InlineHookCommandValue!]!
}

type InlineHookCommandValue {
  op: String!
  path: String!
  value: JSON
}

type InlineHookError {
  errorSummary: String!
  errorCauses: [InlineHookErrorCause!]
}

type InlineHookErrorCause {
  errorSummary: String!
}

# ──────────────────────────────────────────────
# Administration / Governance
# ──────────────────────────────────────────────

"""
An administrator role (standard or custom).
"""
type AdminRole {
  id: ID!
  label: String!
  type: AdminRoleType!
  status: String!
  created: DateTime!
  lastUpdated: DateTime!
  assignmentType: String!
  resource: AdminRoleTarget
}

"""
The resource scope of an admin role assignment (group, app, app instance).
"""
type AdminRoleTarget {
  type: String!
  id: ID
  displayName: String
}

"""
A whitelisted origin for CORS and redirect URI purposes (embedded widget deployments).
"""
type TrustedOrigin {
  id: ID!
  name: String!
  origin: URL!
  scopes: [TrustedOriginScope!]!
  status: String!
  created: DateTime!
  createdBy: String!
  lastUpdated: DateTime!
  lastUpdatedBy: String!
}

type TrustedOriginScope {
  type: String!
}

# ──────────────────────────────────────────────
# Branding and Customization
# ──────────────────────────────────────────────

"""
A brand representing the visual identity of an Okta org or custom domain.
"""
type Brand {
  id: ID!
  name: String!
  customPrivacyPolicyUrl: URL
  removePoweredByOkta: Boolean!
  agreeToCustomPrivacyPolicy: Boolean!
  defaultApp: BrandDefaultApp
  emailDomainId: ID
  locale: String
  theme: Theme
  domains: [Domain!]!
}

type BrandDefaultApp {
  appInstanceId: ID!
  appLinkName: String!
  classicApplicationUri: URL
}

"""
Theme (logo, favicon, colors) for a brand.
"""
type Theme {
  id: ID!
  logo: URL
  favicon: URL
  backgroundImage: URL
  primaryColorHex: String
  primaryColorContrastHex: String
  secondaryColorHex: String
  secondaryColorContrastHex: String
  signInPageTouchPointVariant: String!
  endUserDashboardTouchPointVariant: String!
  errorPageTouchPointVariant: String!
  emailTemplateTouchPointVariant: String!
  loadingPageTouchPointVariant: String
}

"""
A verified custom DNS domain for white-labeling an Okta org.
"""
type Domain {
  id: ID!
  domain: String!
  validationStatus: String!
  dnsRecords: [DnsRecord!]!
  publicCertificate: DomainCertificate
  brandId: ID
}

type DnsRecord {
  fqdn: String!
  recordType: String!
  values: [String!]!
  expiration: String
}

type DomainCertificate {
  subject: String
  fingerprint: String
  expiration: String
}

"""
A system email template (e.g., email verification, welcome, password reset).
"""
type EmailTemplate {
  name: String!
  defaultLanguage: String!
  subject: String
  content: EmailTemplateContent
  customizationCount: Int!
}

"""
The locale-specific content of an email template.
"""
type EmailTemplateContent {
  fromName: String
  fromAddress: String
  subject: String!
  body: String!
}

# ──────────────────────────────────────────────
# Password Policy
# ──────────────────────────────────────────────

"""
A password policy defining complexity, age, lockout, and recovery settings.
"""
type PasswordPolicy {
  id: ID!
  name: String!
  status: PolicyStatus!
  priority: Int!
  system: Boolean!
  conditions: PolicyCondition
  settings: PasswordPolicySettings!
  rules: [PasswordPolicyRule!]!
}

type PasswordPolicySettings {
  password: PasswordComplexity!
  recovery: PasswordRecovery!
  lockout: PasswordLockout!
  delegation: PasswordDelegation
}

type PasswordComplexity {
  minLength: Int!
  minLowerCase: Int!
  minUpperCase: Int!
  minNumber: Int!
  minSymbol: Int!
  excludeUsername: Boolean!
  excludeAttributes: [String!]!
  dictionary: PasswordDictionary
  age: PasswordAge!
  historyCount: Int!
}

type PasswordDictionary {
  common: PasswordDictionaryCommon
}

