# ──────────────────────────────────────────────
# Root Types
# ──────────────────────────────────────────────

type Query {
  # Users
  user(id: ID!): User
  users(filter: UserFilter): UserConnection!
  userByLogin(login: String!): User

  # Groups
  group(id: ID!): Group
  groups(q: String, limit: Int, after: String, filter: String): [Group!]!
  groupRule(id: ID!): GroupRule
  groupRules(limit: Int, after: String): [GroupRule!]!

  # Applications
  application(id: ID!): Application
  applications(filter: ApplicationFilter): ApplicationConnection!
  appUser(appId: ID!, userId: ID!): AppUser
  appGroup(appId: ID!, groupId: ID!): AppGroup

  # Sessions
  session(id: ID!): Session

  # Factors / MFA
  factor(userId: ID!, factorId: ID!): Factor
  factors(userId: ID!): [Factor!]!

  # Policies
  policy(id: ID!): Policy
  policies(type: PolicyType, status: PolicyStatus): [Policy!]!
  policyRule(policyId: ID!, ruleId: ID!): PolicyRule

  # Authorization Servers
  authServer(id: ID!): AuthServer
  authServers: [AuthServer!]!
  scope(authServerId: ID!, scopeId: ID!): Scope
  scopes(authServerId: ID!): [Scope!]!
  claim(authServerId: ID!, claimId: ID!): Claim
  claims(authServerId: ID!): [Claim!]!

  # OAuth Clients and Tokens
  oauthClient(clientId: ID!): OAuthClient
  accessTokens(userId: ID!, appName: String!): [AccessToken!]!
  refreshTokens(userId: ID!, appName: String!): [RefreshToken!]!
  introspect(token: String!, tokenTypeHint: String): IntrospectionResult

  # Security
  threatInsight: ThreatInsight
  networkZone(id: ID!): NetworkZone
  networkZones(filter: String): [NetworkZone!]!
  behaviorRule(id: ID!): BehaviorRule
  behaviorRules: [BehaviorRule!]!

  # Hooks
  eventHook(id: ID!): EventHook
  eventHooks: [EventHook!]!
  inlineHook(id: ID!): InlineHook
  inlineHooks(type: String): [InlineHook!]!

  # Admin / Governance
  adminRole(userId: ID!, roleId: ID!): AdminRole
  adminRoles(userId: ID!): [AdminRole!]!
  trustedOrigin(id: ID!): TrustedOrigin
  trustedOrigins: [TrustedOrigin!]!

  # Branding
  brand(id: ID!): Brand
  brands: [Brand!]!
  domain(id: ID!): Domain
  domains: [Domain!]!
  emailTemplate(brandId: ID!, templateName: String!): EmailTemplate
  emailTemplates(brandId: ID!): [EmailTemplate!]!

  # Schemas
  userSchema(typeId: ID!): UserSchema
  groupSchema: GroupSchema

  # Linked Objects
  linkedObject(name: String!): LinkedObject
  linkedObjects: [LinkedObject!]!

  # Devices
  device(id: ID!): Device
  devices(q: String, limit: Int, after: String): [Device!]!

  # System Log
  systemLog(uuid: ID!): SystemLog
  systemLogs(filter: SystemLogFilter!): SystemLogConnection!

  # Rate Limits
  rateLimits: [RateLimitAdmin!]!
}

type Mutation {
  # Users
  createUser(input: CreateUserInput!): UserMutationResult!
  updateUser(id: ID!, input: UpdateUserInput!): UserMutationResult!
  activateUser(id: ID!, sendEmail: Boolean): UserMutationResult!
  deactivateUser(id: ID!): UserMutationResult!
  suspendUser(id: ID!): UserMutationResult!
  unsuspendUser(id: ID!): UserMutationResult!
  unlockUser(id: ID!): UserMutationResult!
  deleteUser(id: ID!): DeleteResult!
  expirePassword(id: ID!, tempPassword: Boolean): UserMutationResult!
  resetPassword(id: ID!, sendEmail: Boolean): UserMutationResult!

  # Groups
  createGroup(input: CreateGroupInput!): GroupMutationResult!
  updateGroup(id: ID!, input: GroupProfileInput!): GroupMutationResult!
  deleteGroup(id: ID!): DeleteResult!
  addUserToGroup(groupId: ID!, userId: ID!): DeleteResult!
  removeUserFromGroup(groupId: ID!, userId: ID!): DeleteResult!

  # Group Rules
  createGroupRule(name: String!, conditions: JSON!, assignToGroupIds: [ID!]!): GroupRuleMutationResult!
  activateGroupRule(id: ID!): GroupRuleMutationResult!
  deactivateGroupRule(id: ID!): GroupRuleMutationResult!
  deleteGroupRule(id: ID!): DeleteResult!

  # Applications
  createApplication(label: String!, signOnMode: String!, settings: JSON): ApplicationMutationResult!
  updateApplication(id: ID!, label: String, settings: JSON): ApplicationMutationResult!
  activateApplication(id: ID!): ApplicationMutationResult!
  deactivateApplication(id: ID!): ApplicationMutationResult!
  deleteApplication(id: ID!): DeleteResult!
  assignUserToApp(appId: ID!, userId: ID!, profile: JSON): AppUserMutationResult!
  removeUserFromApp(appId: ID!, userId: ID!): DeleteResult!
  assignGroupToApp(appId: ID!, groupId: ID!, priority: Int): AppGroupMutationResult!
  removeGroupFromApp(appId: ID!, groupId: ID!): DeleteResult!

  # Sessions
  createSession(sessionToken: String!): SessionMutationResult!
  refreshSession(id: ID!): SessionMutationResult!
  closeSession(id: ID!): DeleteResult!
  clearUserSessions(userId: ID!): DeleteResult!

  # Factors
  enrollFactor(userId: ID!, factorType: FactorType!, provider: FactorProvider!, profile: JSON): FactorMutationResult!
  activateFactor(userId: ID!, factorId: ID!, passCode: String, answer: String): FactorMutationResult!
  verifyFactor(userId: ID!, factorId: ID!, passCode: String, answer: String): ChallengeMutationResult!
  resetFactors(userId: ID!): DeleteResult!
  deleteFactor(userId: ID!, factorId: ID!): DeleteResult!

  # Admin Roles
  assignRoleToUser(userId: ID!, type: AdminRoleType!): AdminRoleMutationResult!
  removeRoleFromUser(userId: ID!, roleId: ID!): DeleteResult!
  assignRoleToGroup(groupId: ID!, type: AdminRoleType!): AdminRoleMutationResult!
  removeRoleFromGroup(groupId: ID!, roleId: ID!): DeleteResult!

  # Hooks
  createEventHook(name: String!, events: [String!]!, uri: URL!, headers: JSON, authScheme: JSON): EventHookMutationResult!
  activateEventHook(id: ID!): EventHookMutationResult!
  deactivateEventHook(id: ID!): EventHookMutationResult!
  deleteEventHook(id: ID!): DeleteResult!
  createInlineHook(name: String!, type: String!, uri: URL!, headers: JSON, authScheme: JSON): InlineHookMutationResult!
  activateInlineHook(id: ID!): InlineHookMutationResult!
  deactivateInlineHook(id: ID!): InlineHookMutationResult!
  deleteInlineHook(id: ID!): DeleteResult!

  # Network Zones
  createNetworkZone(name: String!, type: NetworkZoneType!, gateways: [JSON!], proxies: [JSON!], locations: [JSON!], asns: [String!]): NetworkZoneMutationResult!
  updateNetworkZone(id: ID!, name: String, gateways: [JSON!], proxies: [JSON!]): NetworkZoneMutationResult!
  activateNetworkZone(id: ID!): NetworkZoneMutationResult!
  deactivateNetworkZone(id: ID!): NetworkZoneMutationResult!
  deleteNetworkZone(id: ID!): DeleteResult!

  # Branding
  updateTheme(brandId: ID!, themeId: ID!, primaryColorHex: String, secondaryColorHex: String, signInPageTouchPointVariant: String, endUserDashboardTouchPointVariant: String): ThemeMutationResult!

  # Trusted Origins
  createTrustedOrigin(name: String!, origin: URL!, scopes: [JSON!]!): TrustedOriginMutationResult!
  activateTrustedOrigin(id: ID!): TrustedOriginMutationResult!
  deactivateTrustedOrigin(id: ID!): TrustedOriginMutationResult!
  deleteTrustedOrigin(id: ID!): DeleteResult!

  # Threat Insight
  updateThreatInsight(action: String!, excludeZones: [ID!]): ThreatInsightMutationResult!
}

