}

type UserSchemaCustomProperties {
  id: String!
  type: String!
  properties: JSON!
}

type UserSchemaProperties {
  profile: UserSchemaPropertiesProfile!
}

type UserSchemaPropertiesProfile {
  allOf: [UserSchemaRef!]!
}

type UserSchemaRef {
