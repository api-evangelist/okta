aid: okta
name: Okta
description: Okta is the workforce identity incumbent — its Identity Cloud platform (also called the Okta Workforce
  Identity Platform) covers Single Sign-On, Adaptive MFA, Universal Directory, Lifecycle Management, Identity Governance,
  Privileged Access, Device Access, Identity Threat Protection, Identity Security Posture Management, Access Gateway,
  and API Access Management. Customer identity is handled by Auth0, which Okta acquired in 2021 and now operates as
  its consumer-facing identity arm. The platform now extends to securing AI agents via Okta for AI Agents and the
  Cross-App Access (XAA) protocol — an emerging OAuth profile based on the IETF ID-JAG draft for agent-to-app
  authorization. The Okta Management API is the primary developer surface, with an official MCP server (okta-mcp-server)
  exposing administrative operations to LLM agents under human-in-the-loop confirmation.
kind: contract
