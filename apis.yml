apis:
- aid: okta:okta-api
  name: Okta API
  description: The Okta API is a unified identity and access management interface that allows developers to integrate authentication,
    authorization, user management, group management, application provisioning, policies, sessions, hooks, logs, and more
    into their applications. It provides programmatic access to the full Okta Identity Cloud platform for managing identity
    lifecycle and security across enterprise systems.
