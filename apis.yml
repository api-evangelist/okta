apis:
- aid: okta:okta-api
  name: Okta API
  description: The Okta Management API is the unified identity and access management interface for the Okta Workforce
    Identity Platform. It allows developers to integrate authentication, authorization, user/group/application management,
    policies, sessions, hooks, system logs, identity providers, authorization servers, brands, network zones, and
    governance into their applications. Access uses scoped OAuth 2.0 tokens or legacy API tokens, with rate limiting
    per org and SKU. The canonical OpenAPI spec is published at github.com/okta/okta-management-openapi-spec under
    dist/current/.
  humanURL: https://developer.okta.com/docs/reference/
