specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Okta
providerId: okta
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Identity
description: Okta API rate limits per org by SKU.
sources:
  - https://www.okta.com/pricing/
  - https://developer.okta.com/docs/reference/rate-limits/
headers:
  limit: X-Rate-Limit-Limit
  remaining: X-Rate-Limit-Remaining
  reset: X-Rate-Limit-Reset
responseCodes:
  throttled: 429
limits:
  - name: Authentication endpoint (default)
    scope: org
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Apps endpoint
    scope: org
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Logs endpoint
    scope: org
    metric: requests_per_minute
    limit: 120
    timeFrame: minute
  - name: Users endpoint
    scope: org
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: OAuth /token
    scope: org
    metric: requests_per_minute
    limit: 1000
    timeFrame: minute
